#!/usr/sbin/nft -f
# nftables configuration for VLESS blue-green deployment
# Location: /etc/nftables.conf (or include from main config)
# 
# This config redirects external port 443 to internal port 10080 or 10081
# To switch between instances, flush and re-add the rule in prerouting_vless chain

# Flush any existing rules (clean slate)
flush ruleset

# Create table for NAT operations
table ip nat {
    # Main prerouting chain for all incoming traffic
    chain prerouting {
        type nat hook prerouting priority -100;
        policy accept;
        
        # Jump to vless-specific chain for port 443 traffic
        tcp dport 443 jump prerouting_vless
    }

    # Dedicated chain for VLESS routing - makes switching easier
    chain prerouting_vless {
        # DEFAULT: Route to Instance A (port 10080)
        # To switch to Instance B, replace this rule with: tcp dport 443 counter dnat to :10081
        tcp dport 443 counter dnat to :10080
        
        # Note: Only ONE rule should exist here at a time
        # The counter allows you to see packet/byte counts for monitoring
    }

    # Postrouting for masquerading (if needed for outbound traffic)
    chain postrouting {
        type nat hook postrouting priority 100;
        policy accept;
        
        # Uncomment if instances need to access external resources
        # oifname "eth0" masquerade
    }
}

# Optional: Filter rules for additional security
table ip filter {
    chain input {
        type filter hook input priority 0;
        policy accept;
        
        # Allow established connections
        ct state established,related accept
        
        # Allow loopback
        iif lo accept
        
        # Allow VLESS ports from localhost only (security)
        # External traffic should only hit 443, not direct access to 10080/10081
        tcp dport { 10080, 10081 } ip saddr != 127.0.0.0/8 drop
        
        # Allow SSH (adjust port if needed)
        tcp dport 22 accept
        
        # Allow HTTPS
        tcp dport 443 accept
    }

    chain forward {
        type filter hook forward priority 0;
        policy accept;
    }

    chain output {
        type filter hook output priority 0;
        policy accept;
    }
}
